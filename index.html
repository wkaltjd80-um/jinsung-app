<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진성씨앤아이 통합 관제</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK (데이터 저장용) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. Firebase 콘솔에서 발급받은 본인의 설정을 아래에 넣으세요
        const firebaseConfig = {
            apiKey: "본인의_API_KEY",
            authDomain: "본인의_프로젝트.firebaseapp.com",
            projectId: "본인의_프로젝트",
            storageBucket: "본인의_프로젝트.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 보고서 전송 함수
        window.sendReport = async () => {
            const text = document.getElementById('reportText').value;
            if(!text) return alert("내용을 입력하세요");
            
            await addDoc(collection(db, "reports"), {
                text: text,
                timestamp: new Date()
            });
            alert("전송 완료!");
            document.getElementById('reportText').value = '';
        };

        // 실시간 목록 불러오기 (데이터가 추가될 때마다 회장님 화면에 자동 갱신됩니다)
        onSnapshot(query(collection(db, "reports"), orderBy("timestamp", "desc")), (snapshot) => {
            const list = document.getElementById('reportList');
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="bg-white p-4 rounded shadow mb-2">${d.text}</div>`;
            });
        });
    </script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4">현장 보고</h1>
        <textarea id="reportText" class="w-full p-2 border rounded mb-4" rows="3"></textarea>
        <button onclick="sendReport()" class="w-full bg-blue-600 text-white py-2 rounded">전송하기</button>
        
        <h2 class="text-xl font-bold mt-8 mb-3">전체 보고 목록 (실시간)</h2>
        <div id="reportList"></div>
    </div>
</body>
</html>
