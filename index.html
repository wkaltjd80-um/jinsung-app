<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>진성씨앤아이 불량/고장 접수 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = { projectId: "jinsung-factory-demo" }; // 실제 환경에 맞게 조정 가능
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'jinsung-factory-app';

        signInAnonymously(auth);

        // 실시간 불량 데이터 리스너
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'defects'), (snapshot) => {
            let defectData = [];
            snapshot.forEach(doc => defectData.push({ id: doc.id, ...doc.data() }));
            updateDefectTable(defectData);
            updateDefectDashboard(defectData);
        });

        window.submitDefect = async function(event) {
            event.preventDefault();
            const form = event.target;
            
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'defects'), {
                    type: form.defect_type.value,
                    line: form.defect_line.value,
                    part: form.part_name.value,
                    qty: parseInt(form.qty.value) || 0,
                    cause: form.defect_cause.value,
                    action: form.defect_type.value === '설비고장' ? '-' : form.action_result.value,
                    date: new Date().toISOString().split('T')[0],
                    timestamp: serverTimestamp()
                });
                alert("보고 완료되었습니다.");
                form.reset();
            } catch(e) { alert("전송 실패"); }
        };

        function updateDefectTable(data) {
            const tbody = document.getElementById('table-body-defect');
            tbody.innerHTML = data.map(d => `
                <tr class="border-b text-sm">
                    <td class="p-2">${d.date}</td>
                    <td class="p-2 font-bold">${d.line}</td>
                    <td class="p-2">${d.part}</td>
                    <td class="p-2">${d.type}</td>
                </tr>
            `).join('');
        }

        function updateDefectDashboard(data) {
            // 차트 로직 (기존 유지)
        }
    </script>
</head>
<body class="bg-slate-50 pb-20">

    <header class="bg-red-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-triangle-exclamation mr-2"></i>진성씨앤아이 불량/고장 접수</h1>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <form onsubmit="submitDefect(event)" class="space-y-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            
            <!-- 라인 선택 -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">발생 라인</label>
                <select name="defect_line" class="w-full border p-3 rounded-lg" required>
                    <option value="자동화 라인">자동화 라인</option>
                    <option value="수동 라인">수동 라인</option>
                    <option value="로봇 CNC">로봇 CNC</option>
                </select>
            </div>

            <!-- 제품명 (직접 입력) -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">제품명 / 품번</label>
                <input type="text" name="part_name" class="w-full border p-3 rounded-lg" placeholder="제품명을 직접 입력하세요" required>
            </div>

            <!-- 수량 -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">수량 (EA)</label>
                <input type="number" name="qty" class="w-full border p-3 rounded-lg" placeholder="0" required>
            </div>

            <!-- 유형 -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">유형</label>
                <div class="grid grid-cols-2 gap-2">
                    <input type="radio" name="defect_type" value="품질불량" id="q" class="peer hidden" checked>
                    <label for="q" class="p-3 text-center border-2 rounded-lg peer-checked:bg-red-600 peer-checked:text-white cursor-pointer font-bold">품질 불량</label>
                    
                    <input type="radio" name="defect_type" value="설비고장" id="m" class="peer hidden">
                    <label for="m" class="p-3 text-center border-2 rounded-lg peer-checked:bg-amber-500 peer-checked:text-white cursor-pointer font-bold">설비 고장</label>
                </div>
            </div>

            <!-- 상세 내용 -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">발생 사유/내용</label>
                <textarea name="defect_cause" class="w-full border p-3 rounded-lg" rows="3" required></textarea>
            </div>

            <!-- 사진 -->
            <div class="border-2 border-dashed p-4 text-center text-slate-400 rounded-lg">
                <i class="fa-solid fa-camera text-2xl mb-2"></i>
                <p class="text-xs">사진 촬영/첨부</p>
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl">즉시 보고 전송</button>
        </form>
    </main>

</body>
</html>
