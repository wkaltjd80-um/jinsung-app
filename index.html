<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장 보고 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4">현장 보고</h1>
        
        <textarea id="reportText" class="w-full p-2 border rounded mb-4" rows="4" placeholder="보고 내용을 입력하세요..."></textarea>
        
        <input type="file" id="imageInput" accept="image/*" capture="environment" class="mb-4">
        <div id="previewContainer" class="mb-4 hidden">
            <img id="preview" src="" alt="미리보기" class="w-full rounded shadow">
        </div>

        <button id="sendBtn" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">전송하기</button>
        
        <div id="statusMessage" class="mt-4 text-center font-medium"></div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const previewContainer = document.getElementById('previewContainer');
        const sendBtn = document.getElementById('sendBtn');
        const reportText = document.getElementById('reportText');
        const statusMessage = document.getElementById('statusMessage');

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    previewContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        sendBtn.addEventListener('click', () => {
            const text = reportText.value;
            const photo = preview.src;

            if (!text && !photo) {
                statusMessage.innerText = "내용이나 사진을 입력해주세요.";
                statusMessage.classList.add('text-red-500');
                return;
            }

            // 전송 로직 시뮬레이션
            statusMessage.innerText = "보고 데이터를 전송 중입니다...";
            statusMessage.classList.remove('text-red-500');
            statusMessage.classList.add('text-blue-600');

            setTimeout(() => {
                statusMessage.innerText = "전송 완료되었습니다!";
                statusMessage.classList.remove('text-blue-600');
                statusMessage.classList.add('text-green-600');
                
                // 전송 후 초기화
                reportText.value = '';
                previewContainer.classList.add('hidden');
                imageInput.value = '';
            }, 1500);
        });
    </script>
</body>
</html>
