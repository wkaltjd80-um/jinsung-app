<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진성씨앤아이 통합 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50">

    <!-- 탭 네비게이션 -->
    <nav class="bg-slate-900 text-white p-4 flex justify-around sticky top-0 z-50">
        <button onclick="showTab('input')" class="font-bold"><i class="fa-solid fa-pen-to-square mr-2"></i>불량 접수</button>
        <button onclick="showTab('dashboard')" class="font-bold"><i class="fa-solid fa-chart-line mr-2"></i>대시보드</button>
    </nav>

    <!-- 입력 폼 탭 -->
    <main id="input-tab" class="tab-content active p-4 max-w-lg mx-auto">
        <form class="space-y-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-4">불량/고장 접수</h2>
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">발생 라인</label>
                <select class="w-full border p-3 rounded-lg">
                    <option>자동화 라인</option>
                    <option>수동 라인</option>
                    <option>로봇 CNC</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">제품명</label>
                <input type="text" class="w-full border p-3 rounded-lg" placeholder="제품명을 입력하세요">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">수량 (EA)</label>
                <input type="number" class="w-full border p-3 rounded-lg" placeholder="0">
            </div>

            <!-- 사진 첨부 영역 추가 -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">현장 사진 (선택)</label>
                <input type="file" id="imageInput" accept="image/*" capture="environment" class="hidden" onchange="previewImage(event)">
                <label for="imageInput" class="cursor-pointer border-2 border-dashed p-4 block text-center text-slate-400 rounded-lg hover:border-indigo-400 transition bg-slate-50">
                    <i class="fa-solid fa-camera text-2xl mb-2"></i>
                    <p class="text-sm">터치하여 촬영/사진 선택</p>
                </label>
                <img id="imagePreview" class="mt-4 hidden w-full rounded-lg shadow-sm border" />
            </div>

            <button type="button" class="w-full bg-red-600 text-white font-bold py-4 rounded-xl">즉시 보고 전송</button>
        </form>
    </main>

    <!-- 대시보드 탭 -->
    <main id="dashboard-tab" class="tab-content p-4 max-w-lg mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-4">실시간 현황</h2>
            <div class="h-64"><canvas id="mainChart"></canvas></div>
            <div class="mt-4 text-sm text-slate-600">
                <p>총 불량 건수: 8건</p>
                <p>최근 발생: 2026.06.24 (자동화 라인)</p>
            </div>
        </div>
    </main>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        // 사진 미리보기 기능
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }
        
        // 차트 초기화
        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['자동화', '수동', 'CNC'],
                datasets: [{ label: '건수', data: [5, 2, 1], backgroundColor: '#ef4444' }]
            }
        });
    </script>
</body>
</html>
